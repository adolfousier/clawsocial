name: Auto-assign

on:
  pull_request:
    types: [opened, reopened]
  issues:
    types: [opened, reopened]

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign adolfousier
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.number }} -X PATCH -f assignees[]="adolfousier"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
